trigger:
- main

# ========================
# Linux agent (IMPORTANT)
# ========================
pool:
  vmImage: 'ubuntu-latest'

steps:

# ========================
# 1. CHECK REPO FILES
# ========================
- checkout: self

- script: |
    echo "===== FILES IN REPO ====="
    ls -R
  displayName: Verify Files

# ========================
# 2. COPY FILES TO VM
# ========================
- task: CopyFilesOverSSH@0
  inputs:
    sshEndpoint: 'react-vm-ssh'
    sourceFolder: '$(System.DefaultWorkingDirectory)'
    contents: |
      **/*
    targetFolder: '/tmp/website'
    cleanTargetFolder: true

# ========================
# 3. DEPLOY ON VM (NGINX)
# ========================
- task: SSH@0
  inputs:
    sshEndpoint: 'react-vm-ssh'
    runOptions: 'commands'
    commands: |
      set -e

      echo "===== UPDATE SYSTEM ====="
      sudo apt-get update -y

      echo "===== INSTALL NGINX ====="
      sudo apt-get install -y nginx

      echo "===== CLEAN WEB ROOT ====="
      sudo rm -rf /var/www/html/*
      sudo mkdir -p /var/www/html

      echo "===== DEPLOY FILES ====="
      sudo cp -r /tmp/website/* /var/www/html/

      echo "===== SET INDEX FILE ====="
      if [ -f /var/www/html/index.html ]; then
        echo "index.html already exists"
      elif [ -f /var/www/html/calculator.html ]; then
        sudo mv /var/www/html/calculator.html /var/www/html/index.html
      fi

      echo "===== PERMISSIONS FIX ====="
      sudo chmod -R 755 /var/www/html

      echo "===== START NGINX ====="
      sudo systemctl enable nginx
      sudo systemctl restart nginx

      echo "===== STATUS CHECK ====="
      sudo systemctl status nginx --no-pager

      echo "===== PORT CHECK ====="
      sudo ss -tulnp | grep :80 || true

      echo "===== DEPLOY DONE ====="