trigger:
- main

pool:
  name: Default

steps:
# Repository checkout
- checkout: self

# Verify files in repository
- script: |
    echo "===== FILES IN REPOSITORY ====="
    pwd
    ls -la
  displayName: 'Verify Files'

# Copy website files to VM
- task: CopyFilesOverSSH@0
  displayName: 'Copy Website Files'
  inputs:
    sshEndpoint: 'react-vm-ssh'
    sourceFolder: '$(System.DefaultWorkingDirectory)'
    contents: |
      calculator.html
      script.js
      style.css
    targetFolder: '/tmp/website'
    cleanTargetFolder: true
    overwrite: true

# Install Nginx and deploy website
- task: SSH@0
  displayName: 'Deploy Website'
  inputs:
    sshEndpoint: 'react-vm-ssh'
    runOptions: 'commands'
    commands: |
      set -e

      echo "===== INSTALL NGINX ====="
      sudo apt-get update
      sudo apt-get install -y nginx

      echo "===== CHECK COPIED FILES ====="
      ls -la /tmp/website

      echo "===== CLEAN WEB DIRECTORY ====="
      sudo rm -rf /var/www/html/*
      sudo mkdir -p /var/www/html

      echo "===== COPY FILES TO NGINX DIRECTORY ====="
      sudo cp -r /tmp/website/* /var/www/html/

      echo "===== RENAME calculator.html TO index.html ====="
      if [ -f /var/www/html/calculator.html ]; then
        sudo mv /var/www/html/calculator.html /var/www/html/index.html
      fi

      echo "===== SET PERMISSIONS ====="
      sudo chown -R www-data:www-data /var/www/html
      sudo chmod -R 755 /var/www/html

      echo "===== CONFIGURE NGINX ====="
      sudo bash -c 'cat > /etc/nginx/sites-available/default <<EOF
      server {
          listen 80 default_server;
          listen [::]:80 default_server;

          root /var/www/html;
          index index.html index.htm;

          server_name _;

          location / {
              try_files \$uri \$uri/ /index.html;
          }
      }
      EOF'

      echo "===== TEST NGINX CONFIGURATION ====="
      sudo nginx -t

      echo "===== RESTART NGINX ====="
      sudo systemctl enable nginx
      sudo systemctl restart nginx

      echo "===== NGINX STATUS ====="
      sudo systemctl status nginx --no-pager

      echo "===== DEPLOYED FILES ====="
      ls -la /var/www/html

      echo "===== WEBSITE DEPLOYMENT COMPLETED ====="